name: Terraform CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform-ci.yml'

env:
  TF_VERSION: '1.6.0'
  TF_WORKING_DIR: infra/terraform

jobs:
  terraform-check:
    name: Format & Validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Terraform Init (no backend)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Format Check
        id: fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Comment fmt/validate result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = [
              '#### Terraform Format 🖌 `${{ steps.fmt.outcome }}`',
              '#### Terraform Validate ✅ `${{ steps.validate.outcome }}`',
              '',
              '*Pushed by: @${{ github.actor }}, Action: `${{ github.event_name }}`*'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  terraform-plan:
    name: Plan
    needs: terraform-check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_kakao_client_id=${{ secrets.TF_KAKAO_CLIENT_ID }}" \
            -var="cognito_kakao_client_secret=${{ secrets.TF_KAKAO_CLIENT_SECRET }}" \
            -var="cognito_google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="cognito_google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -no-color \
            -out=tfplan 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Comment plan result on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8');
            const truncated = plan.length > 4000
              ? plan.substring(0, 4000) + '\n...(truncated — see Actions log for full output)'
              : plan;
            const output = [
              '#### Terraform Plan 📖',
              '```',
              truncated,
              '```',
              `*Outcome: \`${{ steps.plan.outcome }}\`*`
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  terraform-apply:
    name: Apply
    needs: terraform-check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform apply \
            -var="db_password=${{ secrets.TF_DB_PASSWORD }}" \
            -var="cognito_kakao_client_id=${{ secrets.TF_KAKAO_CLIENT_ID }}" \
            -var="cognito_kakao_client_secret=${{ secrets.TF_KAKAO_CLIENT_SECRET }}" \
            -var="cognito_google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="cognito_google_client_secret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -auto-approve
